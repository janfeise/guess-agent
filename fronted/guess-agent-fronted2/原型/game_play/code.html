<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HUNCH - 游戏进行中</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                      "secondary-fixed-dim": "#9bdefa",

                      "on-secondary-fixed": "#004559",

                      "tertiary-container": "#feec95",

                      "outline": "#767c7e",
                      "surface": "#f8f9fa",
                      "secondary-dim": "#005b73",
                      "surface-container-lowest": "#ffffff",
                      "primary-container": "#89f6da",
                      "surface-container": "#ebeef0",
                      "on-primary-fixed": "#00483b",
                      "background": "#f8f9fa",
                      "inverse-surface": "#0c0f10",
                      "tertiary-fixed": "#feec95",
                      "surface-container-highest": "#dee3e6",
                      "on-tertiary-fixed-variant": "#6e6119",
                      "on-primary": "#e4fff5",
                      "on-tertiary": "#fff8ea",
                      "outline-variant": "#adb3b5",
                      "on-primary-container": "#005d4d",
                      "primary-fixed-dim": "#7ae8cc",
                      "on-tertiary-fixed": "#4f4400",
                      "primary": "#006c5a",
                      "on-error": "#fff7f6",
                      "on-surface": "#2d3335",
                      "on-background": "#2d3335",
                      "on-primary-fixed-variant": "#006856",
                      "surface-bright": "#f8f9fa",
                      "secondary": "#1a6780",
                      "inverse-primary": "#91ffe2",
                      "on-secondary-fixed-variant": "#14637c",
                      "tertiary": "#6c5f18",
                      "error-dim": "#67040d",
                      "inverse-on-surface": "#9b9d9e",
                      "tertiary-dim": "#5f530b",
                      "error": "#a83836",

                      "secondary-fixed": "#bbe9ff"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "fontFamily": {
                      "headline": [
                              "Plus Jakarta Sans"
                      ],
                      "body": [
                              "Inter"
                      ],
                      "label": [
                              "Inter"
                      ]
              }
            },
          }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-primary-gradient {
            background: linear-gradient(135deg, #006c5a 0%, #7ae8cc 100%);
        }
        .glass-card {
            background: rgba(222, 227, 230, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        body {
          min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 no-border bg-gradient-to-b from-slate-50 to-transparent">
<div class="flex justify-between items-center px-6 py-4 w-full max-w-screen-xl mx-auto">
<div class="flex items-center gap-4">
<button class="text-emerald-700 dark:text-emerald-400 hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="font-['Plus_Jakarta_Sans'] font-bold tracking-tight text-xl font-black text-emerald-900 dark:text-emerald-100 tracking-widest uppercase">HUNCH</h1>
</div>
<div class="h-10 w-10 rounded-full overflow-hidden shadow-sm">
<img alt="AI 助手头像" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuB0y8CkJZtBgLCIVf3-vtBNqMQxw-eTo9KxQXpvge_ixrq1HCfA5Kgl_yq04hkyIfb6Cx_r8fW-Fd5tQ7JbQjbltg-N3AN90Kz9N2k80t7pnEE8_G5N65xL2xgH7O7j1pjM8sGvl1dcT6BHRupauw0CPlvdTyo-3KElaSErAeihE0Ug1ip09F9yXEaOdSLoVSyN1i_GzzqPcMzNxJ40pzQ3UzX7aghNaFrOvgXA4J4CaIX-OZbx8COS9qCSfNtjYApVoAJqwJAkIDI"/>
</div>
</div>
</header>
<!-- Game Status Bar (Sectional Detail) -->
<section class="mt-20 px-6 pt-4 pb-2 max-w-screen-xl mx-auto w-full">
<div class="flex flex-wrap items-center justify-between gap-4 py-3 px-6 bg-surface-container-low rounded-xl">
<div class="flex items-center gap-6">
<div class="flex flex-col">
<span class="text-[10px] font-semibold text-on-surface-variant uppercase tracking-widest font-label">当前进度</span>
<span class="font-headline font-extrabold text-primary text-xl">第 5 轮</span>
</div>
<div class="h-8 w-[1px] bg-outline-variant/20"></div>
<div class="flex flex-col">
<span class="text-[10px] font-semibold text-on-surface-variant uppercase tracking-widest font-label">挑战信息</span>
<div class="flex items-center gap-2">
<span class="font-headline font-bold text-on-surface">难度: 中等</span>
<div class="flex gap-0.5">
<div class="w-2 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-outline-variant/30"></div>
</div>
</div>
</div>
</div>
<div class="bg-primary-container px-4 py-1.5 rounded-full">
<span class="text-xs font-bold text-on-primary-container font-label">阶段: 用户回合 (提问或猜测)</span>
</div>
</div>
</section>
<!-- Main Game Canvas (Chat Interaction) -->
<main class="flex-1 overflow-y-auto px-6 py-8 max-w-3xl mx-auto w-full flex flex-col space-y-6">
<!-- Agent Bubble -->
<div class="flex flex-col gap-2 max-w-[85%] self-start">
<div class="flex items-center gap-2 mb-1">
<span class="text-[11px] font-bold text-on-surface-variant uppercase tracking-tighter">空灵向导</span>
<span class="material-symbols-outlined text-[14px] text-tertiary" data-icon="auto_awesome">auto_awesome</span>
</div>
<div class="bg-tertiary-container text-on-tertiary-container p-5 rounded-xl rounded-bl-none shadow-[0_4px_20px_rgba(45,51,53,0.04)]">
<p class="font-headline font-medium text-lg leading-relaxed">我正在想一件现代厨房里常见的东西，但它不需要用电。你的第一个问题是什么？</p>
</div>
</div>
<!-- User Bubble -->
<div class="flex flex-col gap-2 max-w-[80%] self-end">
<div class="bg-surface-container-highest text-on-surface p-5 rounded-xl rounded-br-none shadow-[0_4px_20px_rgba(45,51,53,0.04)]">
<p class="font-body text-base">它是用来准备流食还是固体食物的？</p>
</div>
</div>
<!-- Agent Bubble (Glassmorphism / Hunch Card style) -->
<div class="flex flex-col gap-2 max-w-[85%] self-start">
<div class="flex items-center gap-2 mb-1">
<span class="text-[11px] font-bold text-on-surface-variant uppercase tracking-tighter">空灵向导</span>
</div>
<div class="bg-tertiary-container text-on-tertiary-container p-5 rounded-xl rounded-bl-none shadow-[0_4px_20px_rgba(45,51,53,0.04)]">
<p class="font-headline font-medium text-lg leading-relaxed">它主要用于固体食物，不过它的使用过程通常会涉及物理形态的改变。</p>
</div>
</div>
<!-- The Hunch Card (Contextual Hint) -->
<div class="glass-card p-6 rounded-xl border border-white/20 my-4">
<div class="flex items-center gap-3 mb-3">
<span class="material-symbols-outlined text-tertiary" data-icon="lightbulb" style="font-variation-settings: 'FILL' 1;">lightbulb</span>
<span class="font-headline font-bold text-on-surface uppercase tracking-wider text-xs">助手直觉</span>
</div>
<p class="text-on-surface font-headline text-lg leading-tight italic">“多考虑那些依靠人力而非热量的工具。”</p>
</div>
<!-- User Bubble -->
<div class="flex flex-col gap-2 max-w-[80%] self-end">
<div class="bg-surface-container-highest text-on-surface p-5 rounded-xl rounded-br-none shadow-[0_4px_20px_rgba(45,51,53,0.04)]">
<p class="font-body text-base">它是研钵和研杵吗？</p>
</div>
</div>
</main>
<!-- Floating Action Button (AI Assistant) -->
<div class="fixed right-6 bottom-28 z-40">
<button class="bg-primary-gradient p-4 rounded-full shadow-[0_12px_40px_rgba(0,108,90,0.25)] flex items-center justify-center text-on-primary transition-transform active:scale-95 duration-200">
<span class="material-symbols-outlined text-2xl" data-icon="smart_toy" style="font-variation-settings: 'FILL' 1;">smart_toy</span>
</button>
</div>
<!-- Input Area (Bottom) -->
<footer class="bg-surface pb-28 pt-4 px-6 z-40 sticky bottom-0">
<div class="max-w-3xl mx-auto flex items-center gap-3">
<div class="flex-1 relative">
<input class="w-full bg-surface-container-low border-none rounded-xl py-4 px-6 focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all font-body text-on-surface placeholder-on-surface-variant/50" placeholder="提问或尝试猜测..." type="text"/>
</div>
<button class="bg-primary-gradient h-14 w-14 rounded-xl flex items-center justify-center text-on-primary shadow-lg transition-transform active:scale-95">
<span class="material-symbols-outlined" data-icon="send" style="font-variation-settings: 'FILL' 1;">send</span>
</button>
</div>
</footer>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-3 bg-slate-50 dark:bg-slate-950 rounded-t-[2rem] z-50 no-border border-t-[0.5px] border-emerald-500/10 shadow-[0_-12px_40px_rgba(45,51,53,0.06)]">
<a class="flex flex-col items-center justify-center bg-emerald-100 dark:bg-emerald-900/30 text-emerald-800 dark:text-emerald-200 rounded-2xl px-5 py-2 transition-all Active: translate-y-[-2px] duration-300" href="#">
<span class="material-symbols-outlined" data-icon="videogame_asset" style="font-variation-settings: 'FILL' 1;">videogame_asset</span>
<span class="font-['Inter'] text-[11px] font-semibold uppercase tracking-wider mt-1">首页</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-600 px-5 py-2 hover:text-emerald-600 dark:hover:text-emerald-300 transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="font-['Inter'] text-[11px] font-semibold uppercase tracking-wider mt-1">历史</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-600 px-5 py-2 hover:text-emerald-600 dark:hover:text-emerald-300 transition-colors" href="#">
<span class="material-symbols-outlined" data-icon="menu_book">menu_book</span>
<span class="font-['Inter'] text-[11px] font-semibold uppercase tracking-wider mt-1">规则</span>
</a>
</nav>
</body></html>
